name: Build UltraSnake Windows .exe
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pygame pyinstaller
      - name: Build .exe
        run: pyinstaller --onefile --windowed --name "UltraSnake" snake.py
      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: UltraSnake-Windows
          path: dist/UltraSnake.exe
          retention-days: 30
